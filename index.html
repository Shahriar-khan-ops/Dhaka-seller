<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopUp Pro FF Shop</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white}

header{
background:#111827;
padding:15px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
padding:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
text-align:center;
}

button{
background:#22c55e;
border:none;
padding:10px;
border-radius:8px;
color:white;
margin-top:8px;
cursor:pointer;
}

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:15px;
border-radius:12px;
width:90%;
max-width:360px;
z-index:999;
}

input{
width:100%;
padding:10px;
margin:6px 0;
}

.adminBtn{
position:fixed;
bottom:15px;
right:15px;
width:50px;
height:50px;
border-radius:50%;
background:black;
color:white;
}
</style>
</head>

<body>

<header>
<h2>FREE FIRE TOPUP PRO</h2>
<p>Diamond Shop System</p>
</header>

<div class="grid" id="products"></div>

<div class="popup" id="popup"></div>

<div class="popup" id="admin">
<h3>Admin Panel</h3>
<div id="orders"></div>
<button onclick="closeAdmin()" style="background:red">Close</button>
</div>

<button class="adminBtn" onclick="adminLogin()">A</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBMxZzmmygEHfeTP2xuFnJ98N5jmj7YYhs",
authDomain: "dhaka-seller.firebaseapp.com",
projectId: "dhaka-seller",
storageBucket: "dhaka-seller.firebasestorage.app",
messagingSenderId: "332523373651",
appId: "1:332523373651:web:e912f988d65c829b19f2a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let current="";
let selectedPack="";
let selectedPrice=0;
let userLogged=false;
let currentUser="";

/* LOGIN SYSTEM */
window.signup = async function(){
let email = prompt("Email");
let pass = prompt("Password");

await addDoc(collection(db,"users"),{
email, pass
});

alert("Account Created");
};

window.login = async function(){
let email = prompt("Email");
let pass = prompt("Password");

userLogged = true;
currentUser = email;

alert("Logged In");
};

/* FREE FIRE PACKS */
const ffPacks = [
{title:"50 Diamonds", price:45},
{title:"115 Diamonds", price:95},
{title:"240 Diamonds", price:190},
{title:"355 Diamonds", price:280},
{title:"520 Diamonds", price:420},
{title:"1060 Diamonds", price:820}
];

/* PRODUCTS */
const products = ["Free Fire"];

let html="";
products.forEach(p=>{
html+=`
<div class="card">
<h3>${p}</h3>
<button onclick="openFF()">Buy</button>
</div>
`;
});
document.getElementById("products").innerHTML=html;

/* OPEN FF PACKS */
window.openFF=function(){

let packHTML="";
ffPacks.forEach(p=>{
packHTML+=`
<button onclick="selectPack('${p.title}',${p.price})">
${p.title} - ৳${p.price}
</button><br>
`;
});

document.getElementById("popup").innerHTML=`
<h3>Free Fire Diamonds</h3>
${packHTML}
<button onclick="closePopup()" style="background:red">Close</button>
`;

document.getElementById("popup").style.display="block";
};

/* SELECT PACK */
window.selectPack=function(pack,price){
selectedPack=pack;
selectedPrice=price;

document.getElementById("popup").innerHTML=`
<h3>Order ${pack}</h3>

<input id="uid" placeholder="Free Fire UID">
<input id="whatsapp" placeholder="WhatsApp">

<button onclick="placeOrder()">Confirm Order</button>
<button onclick="closePopup()" style="background:red">Close</button>
`;
};

/* PLACE ORDER */
window.placeOrder=async function(){

if(!userLogged){
alert("Please login first");
return;
}

let uid=document.getElementById("uid").value;
let whatsapp=document.getElementById("whatsapp").value;

await addDoc(collection(db,"orders"),{
user: currentUser,
game:"Free Fire",
pack:selectedPack,
price:selectedPrice,
uid,
whatsapp,
status:"pending",
time:new Date().toLocaleString()
});

alert("Order Placed");
closePopup();
};

/* ADMIN UPDATE STATUS */
window.updateStatus=async function(id,status){
await updateDoc(doc(db,"orders",id),{
status
});
alert("Updated");
};

/* ADMIN LOGIN */
window.adminLogin=async function(){
let pass=prompt("Admin Password");
if(pass!="1234"){alert("Wrong");return;}

document.getElementById("admin").style.display="block";

let snap=await getDocs(collection(db,"orders"));

let out="";
snap.forEach(d=>{
let data=d.data();

out+=`
<p>
${data.game} | ${data.pack}<br>
${data.uid}<br>
Status: ${data.status}<br>
<button onclick="updateStatus('${d.id}','done')">Done</button>
<hr>
</p>
`;
});

document.getElementById("orders").innerHTML=out;
};

/* CLOSE */
window.closePopup=()=>document.getElementById("popup").style.display="none";
window.closeAdmin=()=>document.getElementById("admin").style.display="none";

</script>

</body>
</html>
