<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZISAN TOPUP PRO MAX</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0b1220,#0f172a);
color:white;
}

/* HEADER */
header{
background:linear-gradient(135deg,#111827,#1e293b);
padding:18px;
text-align:center;
border-bottom:2px solid #22c55e;
}

.logo{
font-size:20px;
font-weight:bold;
}

.tag{
font-size:12px;
opacity:0.7;
}

/* BANNER */
.v-banner{
height:40px;
overflow:hidden;
background:#22c55e;
color:black;
font-weight:bold;
display:flex;
align-items:center;
}

.v-item{
height:40px;
display:flex;
align-items:center;
justify-content:center;
animation:slideUp 8s infinite;
}

@keyframes slideUp{
0%{transform:translateY(0)}
20%{transform:translateY(0)}
25%{transform:translateY(-40px)}
45%{transform:translateY(-40px)}
50%{transform:translateY(-80px)}
70%{transform:translateY(-80px)}
75%{transform:translateY(-120px)}
100%{transform:translateY(0)}
}

/* NAV */
.nav{
display:flex;
justify-content:space-around;
background:#1e293b;
padding:10px;
position:sticky;
top:0;
}

.nav button{
background:none;
border:none;
color:white;
font-weight:bold;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
padding:15px;
}

/* CARD */
.card{
background:#1e293b;
padding:15px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.2s;
}

.card:hover{
transform:translateY(-5px);
}

.card button{
width:100%;
background:linear-gradient(135deg,#22c55e,#16a34a);
border:none;
padding:10px;
border-radius:10px;
font-weight:bold;
color:white;
cursor:pointer;
}

/* POPUP */
.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:15px;
border-radius:12px;
width:90%;
max-width:360px;
z-index:999;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #ccc;
}

/* ADMIN */
.adminBtn{
position:fixed;
bottom:15px;
right:15px;
width:50px;
height:50px;
border-radius:50%;
background:black;
color:white;
border:none;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
<div class="logo">🎮 AMS TOPUP PRO MAX</div>
<div class="tag">Instant Game Top-Up System</div>
</header>

<!-- BANNER -->
<div class="v-banner">
  <div class="v-item">🔥 Free Fire Diamond Sale</div>
  <div class="v-item">⚡ Instant Delivery 1-5 Min</div>
  <div class="v-item">💰 bKash / Nagad Payment</div>
  <div class="v-item">🎮 All Games Available</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="showHome()">Home</button>
<button onclick="showOrders()">Orders</button>
<button onclick="showProfile()">Profile</button>
</div>

<!-- HOME -->
<div id="home">
<div class="grid" id="products"></div>
</div>

<!-- ORDERS -->
<div id="orders" style="display:none;padding:15px"></div>

<!-- PROFILE -->
<div id="profile" style="display:none;padding:15px"></div>

<!-- POPUP -->
<div class="popup" id="popup"></div>

<!-- ADMIN -->
<div class="popup" id="admin">
<h3>Admin Panel</h3>
<div id="adminOrders"></div>
<button onclick="closeAdmin()" style="background:red">Close</button>
</div>

<button class="adminBtn" onclick="adminLogin()">A</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getFirestore, collection, addDoc, updateDoc, doc, onSnapshot
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {
getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-storage.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyBMxZzmmygEHfeTP2xuFnJ98N5jmj7YYhs",
authDomain: "dhaka-seller.firebaseapp.com",
projectId: "dhaka-seller",
storageBucket: "dhaka-seller.firebasestorage.app",
messagingSenderId: "332523373651",
appId: "1:332523373651:web:e912f988d65c829b19f2a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth();
const storage = getStorage();

let user=null;
let currentGame="";
let selectedPack="";
let selectedPrice=0;
let isSubmitting=false;

/* DOM */
const home=document.getElementById("home");
const orders=document.getElementById("orders");
const profile=document.getElementById("profile");
const popup=document.getElementById("popup");
const admin=document.getElementById("admin");

/* AUTH */
window.signup=async()=>{
let e=prompt("Email");
let p=prompt("Password");
await createUserWithEmailAndPassword(auth,e,p);
alert("Account Created");
};

window.login=async()=>{
let e=prompt("Email");
let p=prompt("Password");
await signInWithEmailAndPassword(auth,e,p);
alert("Logged In");
};

onAuthStateChanged(auth,(u)=>{
user=u;
loadProfile();
loadOrders();
});

/* PRODUCTS */
const games=[
{
name:"Free Fire",
packs:[
{t:"50 Diamonds",p:45},
{t:"115 Diamonds",p:95},
{t:"520 Diamonds",p:420}
]
},
{
name:"eFootball",
packs:[
{t:"500 Coins",p:120}
]
},
{
name:"Roblox",
packs:[
{t:"Robux Pack 1",p:150}
]
}
];

let html="";
games.forEach(g=>{
html+=`
<div class="card">
<h3>${g.name}</h3>
<button onclick="openGame('${g.name}')">Buy Now</button>
</div>
`;
});
document.getElementById("products").innerHTML=html;

/* GAME */
window.openGame=(name)=>{
let g=games.find(x=>x.name===name);

let out=`<h3>${name}</h3>`;
g.packs.forEach(p=>{
out+=`
<button onclick="selectPack('${name}','${p.t}',${p.p})">
${p.t} - ৳${p.p}
</button>
`;
});

popup.innerHTML=out;
popup.style.display="block";
};

/* PACK */
window.selectPack=(g,p,pr)=>{
currentGame=g;
selectedPack=p;
selectedPrice=pr;

popup.innerHTML=`
<h3>${g}</h3>

<input id="uid" placeholder="Game UID">
<input id="whatsapp" placeholder="WhatsApp">

<select id="payment">
<option>bKash</option>
<option>Nagad</option>
</select>

<input type="file" id="img">

<button onclick="placeOrder()">Place Order</button>
<button onclick="closePopup()" style="background:red">Close</button>

<a id="waLink" target="_blank"></a>
`;
};

/* ORDER */
window.placeOrder=async()=>{

if(isSubmitting) return;
isSubmitting=true;

if(!user){
alert("Login required");
isSubmitting=false;
return;
}

let uid=document.getElementById("uid").value;
let whatsapp=document.getElementById("whatsapp").value;

if(!uid || !whatsapp){
alert("Fill all fields");
isSubmitting=false;
return;
}

let file=document.getElementById("img")?.files[0];
let imgURL="";

if(file){
let r=ref(storage,"payments/"+file.name);
await uploadBytes(r,file);
imgURL=await getDownloadURL(r);
}

let waText=`New Order: ${currentGame} ${selectedPack} UID:${uid}`;
let wa=`https://wa.me/8801XXXXXXXXX?text=${encodeURIComponent(waText)}`;

document.getElementById("waLink").href=wa;
document.getElementById("waLink").innerText="Send WhatsApp Message";

await addDoc(collection(db,"orders"),{
user:user.email,
game:currentGame,
pack:selectedPack,
price:selectedPrice,
uid,
whatsapp,
payment:document.getElementById("payment").value,
img:imgURL,
status:"pending",
time:new Date().toLocaleString()
});

alert("Order Placed Successfully!");
closePopup();
isSubmitting=false;
};

/* ORDERS */
window.loadOrders=()=>{
onSnapshot(collection(db,"orders"),(snap)=>{
let out="<h3>Orders</h3>";

snap.forEach(d=>{
let x=d.data();
if(x.user===user?.email){
out+=`<p>${x.game} - ${x.pack}<br>Status: ${x.status}</p><hr>`;
}
});

orders.innerHTML=out;
});
};

/* PROFILE */
window.loadProfile=()=>{
if(!user){
profile.innerHTML=`
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>`;
return;
}

profile.innerHTML=`Logged in: ${user.email}`;
};

/* ADMIN */
window.adminLogin=()=>{
let pass=prompt("Admin Password");
if(pass!="1234")return;

admin.style.display="block";

onSnapshot(collection(db,"orders"),(snap)=>{
let out="";

snap.forEach(d=>{
let x=d.data();

out+=`
<div style="background:#111827;padding:10px;margin:5px;border-radius:8px;color:white">
<b>${x.game}</b> - ${x.pack}<br>
User: ${x.user}<br>
Status: ${x.status}
<br><br>
<button onclick="updateStatus('${d.id}','done')">Done</button>
<button onclick="updateStatus('${d.id}','cancel')">Cancel</button>
</div>`;
});

adminOrders.innerHTML=out;
});
};

/* STATUS */
window.updateStatus=async(id,status)=>{
await updateDoc(doc(db,"orders",id),{status});
};

/* NAV */
window.showHome=()=>{home.style.display="block";orders.style.display="none";profile.style.display="none";}
window.showOrders=()=>{home.style.display="none";orders.style.display="block";profile.style.display="none";}
window.showProfile=()=>{home.style.display="none";orders.style.display="none";profile.style.display="block";}

window.closePopup=()=>popup.style.display="none";
window.closeAdmin=()=>admin.style.display="none";

</script>

</body>
</html>
