<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Free Fire Guild</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

header{
background:#111827;
padding:15px;
}

.container{
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
margin:10px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
<h2>🔥 My Guild Panel</h2>
</header>

<div class="container">

<div class="card">
<h2 id="guildName">Guild Name</h2>
<p>Leader: <span id="leader"></span></p>
<p>Level: <span id="level"></span></p>
</div>

<h3>👥 Members</h3>
<div id="members"></div>

</div>

<script>
let guild = JSON.parse(localStorage.getItem("guild")) || {
name: "Zisan Guild",
leader: "Zisan",
level: 5,
members: []
};

document.getElementById("guildName").innerText = guild.name;
document.getElementById("leader").innerText = guild.leader;
document.getElementById("level").innerText = guild.level;

function loadMembers(){
let html = "";

if(guild.members.length === 0){
html = "<p>No members yet</p>";
} else {
guild.members.forEach(m => {
html += `<div class="card">${m}</div>`;
});
}

document.getElementById("members").innerHTML = html;
}

loadMembers();
</script>

</body>
</html>
