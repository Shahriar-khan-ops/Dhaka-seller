<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMS TopUp Pro</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white}

header{
background:#111827;
padding:15px;
text-align:center;
font-weight:bold;
}

.nav{
display:flex;
justify-content:space-around;
background:#1e293b;
padding:10px;
position:sticky;
top:0;
}

.nav button{
background:none;
border:none;
color:white;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
padding:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
text-align:center;
}

button{
background:#22c55e;
border:none;
padding:10px;
border-radius:8px;
color:white;
margin-top:6px;
cursor:pointer;
}

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:15px;
border-radius:12px;
width:90%;
max-width:360px;
z-index:999;
}

input{
width:100%;
padding:10px;
margin:6px 0;
}

.adminBtn{
position:fixed;
bottom:15px;
right:15px;
width:50px;
height:50px;
border-radius:50%;
background:black;
color:white;
}
</style>
</head>

<body>

<header>AMS TOPUP PRO MAX</header>

<div class="nav">
<button onclick="showHome()">Home</button>
<button onclick="showOrders()">Orders</button>
<button onclick="showProfile()">Profile</button>
</div>

<div id="home">
<div class="grid" id="products"></div>
</div>

<div id="orders" style="display:none;padding:15px"></div>

<div id="profile" style="display:none;padding:15px"></div>

<div class="popup" id="popup"></div>

<div class="popup" id="admin">
<h3>Admin Panel (Live)</h3>
<div id="adminOrders"></div>
<button onclick="closeAdmin()" style="background:red">Close</button>
</div>

<button class="adminBtn" onclick="adminLogin()">A</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { 
getFirestore, collection, addDoc, getDocs, updateDoc, doc, onSnapshot 
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import { 
getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import { 
getStorage, ref, uploadBytes, getDownloadURL 
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-storage.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyBMxZzmmygEHfeTP2xuFnJ98N5jmj7YYhs",
authDomain: "dhaka-seller.firebaseapp.com",
projectId: "dhaka-seller",
storageBucket: "dhaka-seller.firebasestorage.app",
messagingSenderId: "332523373651",
appId: "1:332523373651:web:e912f988d65c829b19f2a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth();
const storage = getStorage();

let user=null;
let currentGame="";
let selectedPack="";
let selectedPrice=0;

/* AUTH */
window.signup = async ()=>{
let e=prompt("Email");
let p=prompt("Password");
await createUserWithEmailAndPassword(auth,e,p);
alert("Account Created");
};

window.login = async ()=>{
let e=prompt("Email");
let p=prompt("Password");
await signInWithEmailAndPassword(auth,e,p);
alert("Logged In");
};

onAuthStateChanged(auth,(u)=>{
user=u;
loadProfile();
loadOrders();
});

/* PRODUCTS */
const games=[
{
name:"Free Fire",
packs:[
{t:"50 Diamonds",p:45},
{t:"115 Diamonds",p:95},
{t:"520 Diamonds",p:420}
]
},
{
name:"eFootball",
packs:[
{t:"500 Coins",p:120}
]
}
];

let html="";
games.forEach(g=>{
html+=`
<div class="card">
<h3>${g.name}</h3>
<button onclick="openGame('${g.name}')">Buy</button>
</div>
`;
});
document.getElementById("products").innerHTML=html;

/* GAME */
window.openGame=(name)=>{
let g=games.find(x=>x.name===name);

let out=`<h3>${name}</h3>`;

g.packs.forEach(p=>{
out+=`
<button onclick="selectPack('${name}','${p.t}',${p.p})">
${p.t} - ৳${p.p}
</button><br>
`;
});

document.getElementById("popup").innerHTML=out;
document.getElementById("popup").style.display="block";
};

/* PACK */
window.selectPack=(g,p,pr)=>{
currentGame=g;
selectedPack=p;
selectedPrice=pr;

document.getElementById("popup").innerHTML=`
<h3>${g}</h3>

<input id="uid" placeholder="UID">
<input id="whatsapp" placeholder="WhatsApp">

<select id="payment">
<option>bKash</option>
<option>Nagad</option>
</select>

<input type="file" id="img">

<button onclick="placeOrder()">Place Order</button>
<button onclick="closePopup()" style="background:red">Close</button>

<a id="waLink" target="_blank"></a>
`;
};

/* ORDER */
window.placeOrder = async ()=>{

if(!user){
alert("Login required");
return;
}

let uid=document.getElementById("uid").value;
let whatsapp=document.getElementById("whatsapp").value;

/* IMAGE UPLOAD */
let file=document.getElementById("img").files[0];
let imgURL="";

if(file){
let r=ref(storage,"payments/"+file.name);
await uploadBytes(r,file);
imgURL=await getDownloadURL(r);
}

/* WHATSAPP LINK */
let wa=`https://wa.me/8801XXXXXXXXX?text=New Order: ${currentGame} ${selectedPack} UID:${uid}`;
document.getElementById("waLink").href=wa;
document.getElementById("waLink").innerText="Send WhatsApp Message";

await addDoc(collection(db,"orders"),{
user:user.email,
game:currentGame,
pack:selectedPack,
price:selectedPrice,
uid,
whatsapp,
payment:document.getElementById("payment").value,
img:imgURL,
status:"pending",
time:new Date().toLocaleString()
});

alert("Order Placed");
closePopup();
};

/* ORDERS */
window.loadOrders=()=>{
onSnapshot(collection(db,"orders"),(snap)=>{

let out="<h3>Orders</h3>";

snap.forEach(d=>{
let x=d.data();

if(x.user===user?.email){
out+=`
<p>
${x.game} - ${x.pack}<br>
Status:${x.status}
</p><hr>`;
}
});

document.getElementById("orders").innerHTML=out;
});
};

/* PROFILE */
window.loadProfile=()=>{
if(!user){
profile.innerHTML=`<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>`;
return;
}

profile.innerHTML=`Logged in: ${user.email}`;
};

/* ADMIN LIVE */
window.adminLogin=()=>{
let pass=prompt("Admin Password");
if(pass!="1234")return;

document.getElementById("admin").style.display="block";

onSnapshot(collection(db,"orders"),(snap)=>{

let out="";

snap.forEach(d=>{
let x=d.data();

out+=`
<p>
${x.game} | ${x.pack}<br>
${x.user}<br>
Status:${x.status}
<button onclick="updateStatus('${d.id}','done')">Done</button>
<button onclick="updateStatus('${d.id}','cancel')">Cancel</button>
<hr>
</p>`;
});

document.getElementById("adminOrders").innerHTML=out;

});
};

/* STATUS */
window.updateStatus=async(id,status)=>{
await updateDoc(doc(db,"orders",id),{status});
};

/* NAV */
window.showHome=()=>{home.style.display="block";orders.style.display="none";profile.style.display="none";}
window.showOrders
