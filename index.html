<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHAKA SELLER PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#f1f5f9}

header{
background:#111827;
color:white;
padding:20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
width:90%;
max-width:350px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.2);
z-index:1000;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

.admin{
position:fixed;
bottom:15px;
right:15px;
background:black;
border-radius:50%;
width:50px;
height:50px;
color:white;
}
</style>
</head>

<body>

<header>
<h1>DHAKA SELLER PRO</h1>
<p>Games • Topup • Instant Order System</p>
</header>

<!-- PRODUCTS -->
<div class="grid" id="products"></div>

<!-- ORDER -->
<div class="popup" id="order"></div>

<!-- ADMIN -->
<div class="popup" id="admin">
<h2>Admin Dashboard</h2>
<div id="orders"></div>
<button onclick="closeAdmin()">Close</button>
</div>

<button class="admin" onclick="adminLogin()">A</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBMxZzmmygEHfeTP2xuFnJ98N5jmj7YYhs",
authDomain: "dhaka-seller.firebaseapp.com",
projectId: "dhaka-seller",
storageBucket: "dhaka-seller.firebasestorage.app",
messagingSenderId: "332523373651",
appId: "1:332523373651:web:e912f988d65c829b19f2a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let current = "";
let isSubmitting = false;

/* PRODUCTS */
const products = [
"Free Fire",
"eFootball",
"Roblox",
"Minecraft",
"FC Mobile"
];

let productHTML = "";
products.forEach(p=>{
productHTML += `
<div class="card">
<h3>${p}</h3>
<button onclick="buy('${p}')">Buy</button>
</div>
`;
});
document.getElementById("products").innerHTML = productHTML;

/* BUY */
window.buy = function(game){
current = game;

document.getElementById("order").innerHTML = `
<h2>${game} Order</h2>

<input id="uid" placeholder="Enter UID / Email / Username">
<input id="whatsapp" placeholder="WhatsApp Number">

<p>bKash/Nagad: 01XXXXXXXXX</p>

<button onclick="confirmOrder()">Confirm Order</button>
<button onclick="closeBox()" style="background:red">Close</button>
`;

document.getElementById("order").style.display="block";
};

/* CONFIRM ORDER */
window.confirmOrder = async function(){

if(isSubmitting) return;
isSubmitting = true;

let uid = document.getElementById("uid").value;
let whatsapp = document.getElementById("whatsapp").value;

if(!uid || !whatsapp){
alert("Fill all fields");
isSubmitting = false;
return;
}

await addDoc(collection(db,"orders"),{
game: current,
uid: uid,
whatsapp: whatsapp,
status: "pending",
time: new Date().toLocaleString()
});

alert("Order Submitted!");
closeBox();

isSubmitting = false;
};

/* CLOSE */
window.closeBox = function(){
document.getElementById("order").style.display="none";
};

/* ADMIN LOGIN */
window.adminLogin = async function(){

let pass = prompt("Admin Password");

if(pass !== "1234"){
alert("Wrong Password");
return;
}

document.getElementById("admin").style.display="block";

let snap = await getDocs(collection(db,"orders"));

let html = "";

snap.forEach(doc=>{
let d = doc.data();

html += `
<p>
🎮 ${d.game}<br>
UID: ${d.uid}<br>
WhatsApp: ${d.whatsapp}<br>
Status: ${d.status}
<hr>
</p>
`;
});

document.getElementById("orders").innerHTML = html || "No Orders";
};

/* CLOSE ADMIN */
window.closeAdmin = function(){
document.getElementById("admin").style.display="none";
};

</script>

</body>
</html>
