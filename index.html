<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>ZISAN TOPUP</title>  
  
<style>  
body{  
margin:0;  
font-family:Arial;  
background:linear-gradient(135deg,#0b1220,#0f172a);  
color:white;  
}  
  
header{  
background:linear-gradient(135deg,#111827,#1e293b);  
padding:18px;  
text-align:center;  
border-bottom:2px solid #22c55e;  
}  
  
.logo{font-size:20px;font-weight:bold;}  
.tag{font-size:12px;opacity:0.7;}  
  
/* LOGO STYLE */  
.game-logo{  
width:60px;  
height:60px;  
object-fit:cover;  
border-radius:12px;  
margin-bottom:8px;  
}  
  
.v-banner{  
height:40px;  
overflow:hidden;  
background:#22c55e;  
color:black;  
font-weight:bold;  
display:flex;  
align-items:center;  
}  
  
.v-item{  
height:40px;  
display:flex;  
align-items:center;  
justify-content:center;  
animation:slideUp 8s infinite;  
}  
  
@keyframes slideUp{  
0%{transform:translateY(0)}  
20%{transform:translateY(0)}  
25%{transform:translateY(-40px)}  
45%{transform:translateY(-40px)}  
50%{transform:translateY(-80px)}  
70%{transform:translateY(-80px)}  
75%{transform:translateY(-120px)}  
100%{transform:translateY(0)}  
}  
  
.nav{  
display:flex;  
justify-content:space-around;  
background:#1e293b;  
padding:10px;  
position:sticky;  
top:0;  
}  
  
.nav button{  
background:none;  
border:none;  
color:white;  
font-weight:bold;  
}  
  
.grid{  
display:grid;  
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));  
gap:12px;  
padding:15px;  
}  
  
.card{  
background:#1e293b;  
padding:15px;  
border-radius:15px;  
text-align:center;  
}  
  
.card button{  
width:100%;  
background:linear-gradient(135deg,#22c55e,#16a34a);  
border:none;  
padding:10px;  
border-radius:10px;  
color:white;  
cursor:pointer;  
}  
  
.popup{  
display:none;  
position:fixed;  
top:50%;  
left:50%;  
transform:translate(-50%,-50%);  
background:white;  
color:black;  
padding:15px;  
border-radius:12px;  
width:90%;  
max-width:360px;  
z-index:999;  
}  
  
input,select{  
width:100%;  
padding:10px;  
margin:6px 0;  
}  
  
.adminBtn{  
position:fixed;  
bottom:15px;  
right:15px;  
width:50px;  
height:50px;  
border-radius:50%;  
background:black;  
color:white;  
border:none;  
}  
</style>  
</head>  
  
<body>  
  
<header>  
<div class="logo">🎮 ZISAN TOPUP SHOP</div>  
<div class="tag">Instant Game Top-Up</div>  
</header>  
  
<div class="v-banner">  
<div class="v-item">🔥 Free Fire Diamond Sale</div>  
<div class="v-item">⚡ Instant Delivery 1-5 Min</div>  
<div class="v-item">💰 bKash / Nagad</div>  
<div class="v-item">🎮 All Games</div>  
</div>  
  
<div class="nav">  
<button onclick="showHome()">Home</button>  
<button onclick="showOrders()">Orders</button>  
<button onclick="showProfile()">Profile</button>  
</div>  
  
<div id="home">  
<div class="grid" id="products"></div>  
</div>  
  
<div id="orders" style="display:none;padding:15px"></div>  
  
<div id="profile" style="display:none;padding:15px"></div>  
  
<div class="popup" id="popup"></div>  
  
<div class="popup" id="admin">  
<h3>Admin Panel</h3>  
<div id="adminOrders"></div>  
<button onclick="closeAdmin()" style="background:red">Close</button>  
</div>  
  
<button class="adminBtn" onclick="adminLogin()">A</button>  
  
<script type="module">  
  
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";  
import {  
getFirestore, collection, addDoc, updateDoc, doc, onSnapshot  
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";  
  
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
  
/* FIREBASE */  
const firebaseConfig = {  
apiKey: "AIzaSyBMxZzmmygEHfeTP2xuFnJ98N5jmj7YYhs",  
authDomain: "dhaka-seller.firebaseapp.com",  
projectId: "dhaka-seller",  
storageBucket: "dhaka-seller.firebasestorage.app",  
messagingSenderId: "332523373651",  
appId: "1:332523373651:web:e912f988d65c829b19f2a6"  
};  
  
const app = initializeApp(firebaseConfig);  
const db = getFirestore(app);  
const auth = getAuth();  
  
let user=null;  
let currentGame="";  
let selectedPack="";  
let selectedPrice=0;  
  
const home=document.getElementById("home");  
const orders=document.getElementById("orders");  
const profile=document.getElementById("profile");  
const popup=document.getElementById("popup");  
const admin=document.getElementById("admin");  
const adminOrders=document.getElementById("adminOrders");  
  
/* AUTH */  
window.signup = async () => {
  try{
    let e = prompt("Email");
    let p = prompt("Password");
    await createUserWithEmailAndPassword(auth, e, p);
    alert("Account Created Successfully");
  }catch(err){
    alert(err.message);
    console.log(err);
  }
};

window.login = async () => {
  try{
    let e = prompt("Email");
    let p = prompt("Password");
    await signInWithEmailAndPassword(auth, e, p);
    alert("Login Successful");
  }catch(err){
    alert(err.message);
    console.log(err);
  }
};
  
onAuthStateChanged(auth,(u)=>{  
user=u;  
loadProfile();  
loadOrders();  
});  
  
/* GAMES WITH LOGO */  
const games=[  
  
{  
name:"Free Fire",  
logo:"ff.png",  
packs:[  
{t:"50 Diamonds",p:45},  
{t:"115 Diamonds",p:95},  
{t:"520 Diamonds",p:420},  
{t:"1060 Diamonds",p:840}  
]  
},  
  
{  
name:"eFootball",  
logo:"football.png",  
packs:[  
{t:"130 Coins",p:40},  
{t:"550 Coins",p:120},  
{t:"1040 Coins",p:220}  
]  
},  
  
{  
name:"Roblox",  
logo:"roblox.png",  
packs:[  
{t:"80 Robux",p:120},  
{t:"400 Robux",p:520},  
{t:"800 Robux",p:990},  
{t:"1700 Robux",p:1990},  
{t:"4500 Robux",p:4990}  
]  
},  
  
{  
name:"Minecraft",  
logo:"minecraft.png",  
packs:[  
{t:"330 Minecoins",p:120},  
{t:"1020 Minecoins",p:320},  
{t:"1720 Minecoins",p:520},  
{t:"3500 Minecoins",p:990}  
]  
}  
  
];  
/* PRODUCTS */  
let html="";  
games.forEach(g=>{  
html+=`  
<div class="card">  
<img src="${g.logo}" class="game-logo">  
<h3>${g.name}</h3>  
<button onclick="openGame('${g.name}')">Buy</button>  
</div>`;  
});  
document.getElementById("products").innerHTML=html;  
  
/* GAME */  
window.openGame=(name)=>{  
let g=games.find(x=>x.name===name);  
  
let out=`<h3>${name}</h3>`;  
g.packs.forEach(p=>{  
out+=`  
<button onclick="selectPack('${name}','${p.t}',${p.p})">  
${p.t} - ৳${p.p}  
</button>`;  
});  
  
popup.innerHTML=out;  
popup.style.display="block";  
};  
  
/* PACK */
window.selectPack=(g,p,pr)=>{
currentGame=g;
selectedPack=p;
selectedPrice=pr;

if(g==="eFootball"){
popup.innerHTML=`
<h3>${g}</h3>

<input id="konamiEmail" placeholder="Konami Gmail">
<input id="konamiPass" type="password" placeholder="Konami Password">
<input id="whatsapp" placeholder="WhatsApp Number">

<select id="payment">
<option>bKash</option>
<option>Nagad</option>
</select>

<button onclick="placeOrder()">Place Order</button>
<button onclick="closePopup()" style="background:red">Close</button>
`;
}else{
popup.innerHTML=`
<h3>${g}</h3>

<input id="uid" placeholder="UID">
<input id="whatsapp" placeholder="WhatsApp Number">

<select id="payment">
<option>bKash</option>
<option>Nagad</option>
</select>

<button onclick="placeOrder()">Place Order</button>
<button onclick="closePopup()" style="background:red">Close</button>
`;
}
};
  
/* ORDER */
window.placeOrder=async()=>{

if(!user){
alert("Login required");
return;
}

let orderData={
user:user.email,
game:currentGame,
pack:selectedPack,
price:selectedPrice,
whatsapp:document.getElementById("whatsapp").value,
status:"pending",
time:new Date().toLocaleString()
};

if(currentGame==="eFootball"){
orderData.konamiEmail=
document.getElementById("konamiEmail").value;

orderData.konamiPass=
document.getElementById("konamiPass").value;
}else{
orderData.uid=
document.getElementById("uid").value;
}

await addDoc(collection(db,"orders"),orderData);

alert("Order Placed");
closePopup();
};
  
/* ORDERS */  
window.loadOrders=()=>{  
onSnapshot(collection(db,"orders"),(snap)=>{  
let out="";  
snap.forEach(d=>{  
let x=d.data();  
if(x.user===user?.email){  
out+=`<p>${x.game} - ${x.pack}<br>${x.status}</p><hr>`;  
}  
});  
orders.innerHTML=out;  
});  
};  
  
/* PROFILE */
window.loadProfile=()=>{

if(!user){

profile.innerHTML=`
<div style="padding:20px;text-align:center">

<h2>Account</h2>

<button
onclick="login()"
style="
width:100%;
padding:12px;
margin-bottom:10px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
font-size:16px;
">
Login
</button>

<button
onclick="signup()"
style="
width:100%;
padding:12px;
background:#2563eb;
border:none;
border-radius:10px;
color:white;
font-size:16px;
">
Sign Up
</button>

</div>
`;
return;
}

profile.innerHTML=`
<div style="padding:20px">

<h2>Profile</h2>

<p><b>Email:</b> ${user.email}</p>

<button
onclick="logout()"
style="
width:100%;
padding:12px;
background:red;
border:none;
border-radius:10px;
color:white;
">
Logout
</button>

</div>
`;
};
  
/* ADMIN */  
window.adminLogin=()=>{  
let pass=prompt("Admin Password");  
if(pass!="1234")return;  
  
admin.style.display="block";  
  
onSnapshot(collection(db,"orders"),(snap)=>{  
let out="";  
snap.forEach(d=>{  
let x=d.data();  
out+=`  
<p>  
${x.game}<br>  
${x.user}<br>  
${x.status}  
</p>`;  
});  
adminOrders.innerHTML=out;  
});  
};  
  
/* NAV */  
window.showHome=()=>{home.style.display="block";orders.style.display="none";profile.style.display="none";}  
window.showOrders=()=>{home.style.display="none";orders.style.display="block";profile.style.display="none";}  
window.showProfile=()=>{home.style.display="none";orders.style.display="none";profile.style.display="block";}  
  
window.closePopup=()=>popup.style.display="none";  
window.closeAdmin=()=>admin.style.display="none";  
  
</script>  
  
</body>  
</html>
