
<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>ZISAN TOPUP</title>  
  
<style>  
body{  
margin:0;  
font-family: 'Segoe UI', Arial, sans-serif;  
background:linear-gradient(135deg,#0b1220,#0f172a);  
color:white;  
}  
  
header{  
background:linear-gradient(135deg,#111827,#1e293b);  
padding:18px;  
text-align:center;  
border-bottom:2px solid #22c55e;  
}  
  
.logo{font-size:20px;font-weight:bold;}  
.tag{font-size:12px;opacity:0.7;}  
  
.v-banner{  
height:40px;  
overflow:hidden;  
background:#22c55e;  
color:black;  
font-weight:bold;  
display:flex;  
align-items:center;  
}  
  
.v-item{  
height:40px;  
width: 100%;
display:flex;  
align-items:center;  
justify-content:center;  
animation:slideUp 8s infinite;  
position: absolute;
}  
  
@keyframes slideUp{  
0%{opacity: 0; transform:translateY(20px)}  
5%{opacity: 1; transform:translateY(0)}  
20%{opacity: 1; transform:translateY(0)}  
25%{opacity: 0; transform:translateY(-20px)}  
100%{opacity: 0;}  
}  

.v-banner .v-item:nth-child(1) { animation-delay: 0s; }
.v-banner .v-item:nth-child(2) { animation-delay: 2s; }
.v-banner .v-item:nth-child(3) { animation-delay: 4s; }
.v-banner .v-item:nth-child(4) { animation-delay: 6s; }
  
.nav{  
display:flex;  
justify-content:space-around;  
background:#1e293b;  
padding:10px;  
position:sticky;  
top:0;  
z-index: 100;
}  
  
.nav button{  
background:none;  
border:none;  
color:white;  
font-weight:bold;  
cursor: pointer;
padding: 5px 10px;
}  
  
.grid{  
display:grid;  
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));  
gap:12px;  
padding:15px;  
}  
  
.card{  
background:#1e293b;  
padding:15px;  
border-radius:15px;  
text-align:center;  
box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}  
  
.card button{  
width:100%;  
background:linear-gradient(135deg,#22c55e,#16a34a);  
border:none;  
padding:10px;  
border-radius:10px;  
color:white;  
cursor:pointer;  
font-weight: bold;
margin-top: 10px;
}  
  
.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111827;  
color:white;  
padding:20px;  
border-radius:12px;  
width:90%;  
max-width:450px;  
max-height:85vh; 
overflow-y:auto; 
z-index:999;
border: 1px solid #374151;
box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
}

/* UPGRADED ADMIN PANEL UI */
.admin-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #374151;
  padding-bottom: 10px;
  margin-bottom: 15px;
}
.admin-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.stat-box {
  background: #1e293b;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  font-size: 14px;
}
.stat-box span {
  display: block;
  font-size: 18px;
  font-weight: bold;
  color: #22c55e;
}
.admin-section {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}
.admin-section h4 { margin: 0 0 10px 0; color: #22c55e; }
.order-item {
  background: #111827;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  font-size: 13px;
  border-left: 4px solid #eab308;
}
.order-item.completed { border-left-color: #22c55e; }
.order-item.cancelled { border-left-color: #ef4444; }
.action-btns { display: flex; gap: 5px; margin-top: 8px; }
.action-btns button {
  flex: 1; padding: 6px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; color: white;
}
  
input, select{  
width:100%;  
padding:10px;  
margin:6px 0;  
box-sizing: border-box;
background: #1f2937;
border: 1px solid #4b5563;
color: white;
border-radius: 6px;
}  
  
.adminBtn{  
position:fixed;  
bottom:15px;  
right:15px;  
width:50px;  
height:50px;  
border-radius:50%;  
background:#22c55e;  
color:white;  
border:none;  
font-weight: bold;
cursor: pointer;
box-shadow: 0 4px 10px rgba(0,0,0,0.5);
z-index: 99;
}  
.close-btn {
  width: 100%; padding: 12px; background: #ef4444; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px;
}
</style>  
</head>  
  
<body>  
  
<header>  
<div class="logo">🎮 ZISAN TOPUP SHOP</div>  
<div class="tag">Instant Game Top-Up</div>  
</header>  
  
<div class="v-banner">  
<div class="v-item">🔥 Free Fire Diamond Sale</div>  
<div class="v-item">⚡ Instant Delivery 1-5 Min</div>  
<div class="v-item">💰 bKash / Nagad</div>  
<div class="v-item">🎮 All Games</div>  
</div>  
  
<div class="nav">  
<button onclick="showHome()">Home</button>  
<button onclick="showOrders()">Orders</button>  
<button onclick="showProfile()">Profile</button>  
</div>  
  
<div id="home">  
<div class="grid" id="products"></div>  
</div>  
  
<div id="orders" style="display:none;padding:15px"><h2>Your Orders</h2><div id="userOrdersList"></div></div>  
  
<div id="profile" style="display:none;padding:15px">
  <h2>User Profile</h2>
  <div id="profileInfo">Loading...</div>
</div>  
  
<div class="popup" id="popup"></div>  
  
<!-- UPGRADED ADMIN PANEL -->
<div class="popup" id="admin">  
  <div class="admin-header">
    <h3>Dashboard Admin Panel</h3>
  </div>

  <!-- Stats Dashboard -->
  <div class="admin-stats">
    <div class="stat-box">Total<span id="statTotal">0</span></div>
    <div class="stat-box">Pending<span id="statPending" style="color:#eab308">0</span></div>
    <div class="stat-box">Success<span id="statSuccess">0</span></div>
  </div>

  <!-- Add Product Section -->
  <div class="admin-section">
    <h4>Add New Product</h4>
    <input type="text" id="prodTitle" placeholder="Product Title (e.g., 115 Diamonds)">
    <input type="number" id="prodPrice" placeholder="Price (TK)">
    <input type="text" id="prodGame" placeholder="Game Category (e.g., Free Fire)">
    <button onclick="addNewProduct()" style="width:100%; background:#22c55e; color:white; border:none; padding:10px; border-radius:6px; font-weight:bold; cursor:pointer;">Add Product</button>
  </div>

  <!-- Orders List Section -->
  <div class="admin-section">
    <h4>Manage Orders</h4>
    <div id="adminOrders">Loading orders...</div>  
  </div>

  <button class="close-btn" onclick="closeAdmin()">Close Panel</button>  
</div>  
  
<button class="adminBtn" onclick="adminLogin()">Admin</button>  
  
<script type="module">  
  
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";  
import {  
getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot  
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";  
  
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
  
/* FIREBASE CONFIGURATION */  
const firebaseConfig = {  
apiKey: "AIzaSyBMxZzmmygEHfeTP2xuFnJ98N5jmj7YYhs",  
authDomain: "dhaka-seller.firebaseapp.com",  
projectId: "dhaka-seller",  
storageBucket: "dhaka-seller.firebasestorage.app",  
messagingSenderId: "332523373651",  
appId: "1:332523373651:web:e912f988d65c829b19f2a6"  
};  
  
const app = initializeApp(firebaseConfig);  
const db = getFirestore(app);  
const auth = getAuth();  
  
let currentUser=null;  
  
/* NAVIGATION FUNCTIONS */
window.showHome = () => { home.style.display="block"; orders.style.display="none"; profile.style.display="none"; }
window.showOrders = () => { home.style.display="none"; orders.style.display="block"; profile.style.display="none"; }
window.showProfile = () => { home.style.display="none"; orders.style.display="none"; profile.style.display="block"; }
window.closeAdmin = () => { admin.style.display="none"; }

/* AUTHENTICATION */  
window.signup = async () => {
  try{
    let e = prompt("Email");
    let p = prompt("Password");
    if(!e || !p) return;
    await createUserWithEmailAndPassword(auth, e, p);
    alert("Account Created Successfully");
  }catch(err){
    alert(err.message);
  }
};

window.login = async () => {
  try{
    let e = prompt("Email");
    let p = prompt("Password");
    if(!e || !p) return;
    await signInWithEmailAndPassword(auth, e, p);
    alert("Logged In Successfully");
  }catch(err){
    alert(err.message);
  }
};

window.logout = () => {
  signOut(auth).then(() => alert("Logged Out!"));
};

onAuthStateChanged(auth, (user) => {
  currentUser = user;
  const profileInfo = document.getElementById("profileInfo");
  if(user) {
    profileInfo.innerHTML = `<p>Email: ${user.email}</p><button onclick="logout()" style="background:red; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">Logout</button>`;
    loadUserOrders(user.email);
  } else {
    profileInfo.innerHTML = `<p>You are not logged in.</p>
    <button onclick="login()" style="background:#22c55e; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; margin-right:5px;">Login</button>
    <button onclick="signup()" style="background:#1e293b; color:white; border:1px solid #4b5563; padding:8px; border-radius:5px; cursor:pointer;">Sign Up</button>`;
    document.getElementById("userOrdersList").innerHTML = "<p>Please login to see your orders.</p>";
  }
});

/* REALTIME PRODUCTS LOAD */
onSnapshot(collection(db, "products"), (snapshot) => {
  const productsGrid = document.getElementById("products");
  productsGrid.innerHTML = "";
  if(snapshot.empty) {
    productsGrid.innerHTML = "<p>No products available.</p>";
  }
  snapshot.forEach((doc) => {
    const data = doc.data();
    productsGrid.innerHTML += `
      <div class="card">
        <h3>${data.title}</h3>
        <p style="color:#22c55e; font-weight:bold;">${data.price} TK</p>
        <span style="font-size:11px; opacity:0.6;">Category: ${data.game}</span>
        <button onclick="openBuyPopup('${doc.id}', '${data.title}', ${data.price})">Buy Now</button>
      </div>
    `;
  });
});

/* BUY POPUP & ORDER PLACE */
window.openBuyPopup = (id, title, price) => {
  if(!currentUser) {
    alert("Please login first to buy products.");
    window.showProfile();
    return;
  }
  popup.style.display = "block";
  popup.innerHTML = `
    <h3 style="margin-top:0;">Checkout: ${title}</h3>
    <p>Price: ${price} TK</p>
    <input type="text" id="gameId" placeholder="Enter Player ID / Game ID">
    <select id="paymentMethod">
      <option value="bKash">bKash Personal</option>
      <option value="Nagad">Nagad Personal</option>
    </select>
    <input type="text" id="trxId" placeholder="Transaction ID (TrxID)">
    <button onclick="placeOrder('${title}', ${price})" style="width:100%; background:#22c55e; color:white; border:none; padding:10px; border-radius:6px; font-weight:bold; cursor:pointer; margin-top:10px;">Submit Order</button>
    <button onclick="document.getElementById('popup').style.display='none'" style="width:100%; background:transparent; border:1px solid #4b5563; color:white; padding:8px; border-radius:6px; margin-top:5px; cursor:pointer;">Cancel</button>
  `;
};

window.placeOrder = async (title, price) => {
  const gameId = document.getElementById("gameId").value;
  const paymentMethod = document.getElementById("paymentMethod").value;
  const trxId = document.getElementById("trxId").value;

  if(!gameId || !trxId) {
    alert("Please fill up all fields!");
    return;
  }

  try {
    await addDoc(collection(db, "orders"), {
      userEmail: currentUser.email,
      productTitle: title,
      price: price,
      gameId: gameId,
      payment: paymentMethod,
      trxId: trxId,
      status: "Pending",
      timestamp: new Date().getTime()
    });
    alert("Order placed successfully! Please wait 1-5 minutes.");
    popup.style.display = "none";
  } catch(err) {
    alert("Error: " + err.message);
  }
};

/* LOAD USER ORDERS */
function loadUserOrders(email) {
  onSnapshot(collection(db, "orders"), (snapshot) => {
    const list = document.getElementById("userOrdersList");
    list.innerHTML = "";
    snapshot.forEach((doc) => {
      const data = doc.data();
      if(data.userEmail === email) {
        list.innerHTML += `
          <div style="background:#1e293b; padding:12px; border-radius:10px; margin-bottom:10px; border-left: 4px solid ${data.status === 'Complete' ? '#22c55e' : (data.status === 'Cancelled' ? '#ef4444' : '#eab308')}">
            <h4>${data.productTitle} - ${data.price} TK</h4>
            <p style="margin:4px 0; font-size:13px;">Player ID: ${data.gameId} | Method: ${data.payment}</p>
            <p style="margin:4px 0; font-size:13px;">Status: <b>${data.status}</b></p>
          </div>
        `;
      }
    });
  });
}

/* ADMIN PANEL LOGIN & REALTIME MONITOR */
window.adminLogin = () => {
  let password = prompt("Enter Admin Password:");
  if(password === "admin123") { // আপনি চাইলে আপনার নিজের পাসওয়ার্ড দিতে পারেন
    admin.style.display = "block";
    loadAdminDashboard();
  } else {
    alert("Wrong Password!");
  }
};

/* ADD PRODUCT VIA ADMIN */
window.addNewProduct = async () => {
  const title = document.getElementById("prodTitle").value;
  const price = Number(document.getElementById("prodPrice").value);
  const game = document.getElementById("prodGame").value;

  if(!title || !price || !game) {
    alert("Please insert all fields!");
    return;
  }

  await addDoc(collection(db, "products"), { title, price, game });
  alert("Product Added Successfully!");
  document.getElementById("prodTitle").value = "";
  document.getElementById("prodPrice").value = "";
  document.getElementById("prodGame").value = "";
};

/* UPDATE ORDER STATUS BY ADMIN */
window.updateStatus = async (orderId, newStatus) => {
  await updateDoc(doc(db, "orders", orderId), { status: newStatus });
};

/* LOAD ADMIN DASHBOARD DATA */
function loadAdminDashboard() {
  onSnapshot(collection(db, "orders"), (snapshot) => {
    adminOrders.innerHTML = "";
    let total = 0, pending = 0, success = 0;

    snapshot.forEach((documentObj) => {
      const data = documentObj.data();
      const id = documentObj.id;
      total++;
      
      let statusClass = "";
      if(data.status === "Complete") { success++; statusClass="completed"; }
      else if(data.status === "Cancelled") { statusClass="cancelled"; }
      else { pending++; }

      adminOrders.innerHTML += `
        <div class="order-item ${statusClass}">
          <b>User:</b> ${data.userEmail}<br>
          <b>Item:</b> ${data.productTitle} (${data.price} TK)<br>
          <b>ID:</b> ${data.gameId} | <b>TrxID:</b> ${data.trxId} [${data.payment}]<br>
          <b>Status:</b> ${data.status}
          <div class="action-btns">
            <button onclick="updateStatus('${id}', 'Complete')" style="background:#22c55e;">Complete</button>
            <button onclick="updateStatus('${id}', 'Cancelled')" style="background:#ef4444;">Cancel</button>
          </div>
        </div>
      `;
    });

    document.getElementById("statTotal").innerText = total;
    document.getElementById("statPending").innerText = pending;
    document.getElementById("statSuccess").innerText = success;
  });
}
</script>  
</body>  
</html>
