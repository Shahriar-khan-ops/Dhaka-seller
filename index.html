<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopUp Shop Pro</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}

header{
background:#111827;
padding:20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
text-align:center;
}

button{
background:#22c55e;
border:none;
padding:10px;
border-radius:8px;
color:white;
cursor:pointer;
margin-top:10px;
}

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:20px;
border-radius:12px;
width:90%;
max-width:360px;
z-index:999;
}

input{
width:100%;
padding:10px;
margin:8px 0;
}

.adminBtn{
position:fixed;
bottom:20px;
right:20px;
width:50px;
height:50px;
border-radius:50%;
background:black;
color:white;
border:none;
}
</style>
</head>

<body>

<header>
<h2>TOPUP SHOP PRO</h2>
<p>Instant Games Top-Up System</p>
</header>

<div class="grid" id="products"></div>

<div class="popup" id="popup"></div>

<div class="popup" id="admin">
<h3>Admin Panel</h3>
<div id="orders"></div>
<button onclick="closeAdmin()" style="background:red">Close</button>
</div>

<button class="adminBtn" onclick="adminLogin()">A</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBMxZzmmygEHfeTP2xuFnJ98N5jmj7YYhs",
authDomain: "dhaka-seller.firebaseapp.com",
projectId: "dhaka-seller",
storageBucket: "dhaka-seller.firebasestorage.app",
messagingSenderId: "332523373651",
appId: "1:332523373651:web:e912f988d65c829b19f2a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let current = "";
let isSubmitting = false;

/* PRODUCTS */
const products = [
"Free Fire",
"eFootball",
"Roblox",
"Minecraft",
"FC Mobile",
"PUBG UC",
"Valorant Points"
];

let html = "";
products.forEach(p=>{
html += `
<div class="card">
<h3>${p}</h3>
<button onclick="openBuy('${p}')">Buy</button>
</div>
`;
});
document.getElementById("products").innerHTML = html;

/* BUY */
window.openBuy = function(game){
current = game;

document.getElementById("popup").innerHTML = `
<h3>${game} Top-Up</h3>

<input id="uid" placeholder="Enter ID / Email">
<input id="whatsapp" placeholder="WhatsApp Number">

<p>Payment: bKash / Nagad</p>

<button onclick="submitOrder()">Confirm Order</button>
<button onclick="closePopup()" style="background:red">Close</button>
`;

document.getElementById("popup").style.display="block";
};

/* SUBMIT ORDER */
window.submitOrder = async function(){

if(isSubmitting) return;
isSubmitting = true;

let uid = document.getElementById("uid").value;
let whatsapp = document.getElementById("whatsapp").value;

if(!uid || !whatsapp){
alert("Fill all fields");
isSubmitting = false;
return;
}

try{
await addDoc(collection(db,"orders"),{
game: current,
uid: uid,
whatsapp: whatsapp,
status: "pending",
time: new Date().toLocaleString()
});

alert("Order Placed!");
closePopup();

}catch(e){
alert("Error!");
}

isSubmitting = false;
};

/* CLOSE POPUP */
window.closePopup = function(){
document.getElementById("popup").style.display="none";
};

/* ADMIN LOGIN */
window.adminLogin = async function(){

let pass = prompt("Admin Password");

if(pass !== "1234"){
alert("Wrong Password");
return;
}

document.getElementById("admin").style.display="block";

let snap = await getDocs(collection(db,"orders"));

let out = "";

snap.forEach(doc=>{
let d = doc.data();

out += `
<p>
🎮 ${d.game}<br>
ID: ${d.uid}<br>
WhatsApp: ${d.whatsapp}<br>
Status: ${d.status}
<hr>
</p>
`;
});

document.getElementById("orders").innerHTML = out || "No Orders";
};

/* CLOSE ADMIN */
window.closeAdmin = function(){
document.getElementById("admin").style.display="none";
};

</script>

</body>
</html>
