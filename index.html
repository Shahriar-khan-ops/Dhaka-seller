<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHAKA SELLER PRO</title>

<style>
body{font-family:Arial;margin:0;background:#eef1f6}
header{background:#111;color:#fff;text-align:center;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;padding:20px}
.card{background:#fff;padding:15px;border-radius:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
button{padding:8px 12px;background:#007bff;color:#fff;border:none;border-radius:6px}
.box{display:none;background:#fff;margin:20px;padding:15px;border-radius:10px}
input{padding:8px;width:90%;margin-top:10px}
.admin-btn{position:fixed;bottom:10px;right:10px;background:black;color:white;padding:10px;border-radius:50%}
</style>
</head>

<body>

<header>
<h2>DHAKA SELLER PRO</h2>
<p>Premium Game Top-Up Shop</p>
</header>

<div class="grid">
<div class="card"><h3>Free Fire</h3><button onclick="buy('Free Fire')">Buy</button></div>
<div class="card"><h3>eFootball</h3><button onclick="buy('eFootball')">Buy</button></div>
<div class="card"><h3>Roblox</h3><button onclick="buy('Roblox')">Buy</button></div>
<div class="card"><h3>Minecraft</h3><button onclick="buy('Minecraft')">Buy</button></div>
<div class="card"><h3>FC Mobile</h3><button onclick="buy('FC Mobile')">Buy</button></div>
</div>

<!-- ORDER -->
<div class="box" id="orderBox">
<h3>Place Order</h3>
<p id="game"></p>
<input id="uid" placeholder="Enter Game UID">
<button onclick="goPay()">Next</button>
</div>

<!-- PAYMENT -->
<div class="box" id="payBox">
<h3>Payment</h3>
<p>bKash/Nagad: 01XXXXXXXXX</p>
<button onclick="confirmOrder()">Confirm Order</button>
</div>

<!-- ADMIN LOGIN -->
<div class="box" id="adminLogin">
<h3>Admin Login</h3>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div class="box" id="adminPanel">
<h3>Orders</h3>
<div id="list"></div>
</div>

<div class="admin-btn" onclick="openAdmin()">A</div>

<script>

let selectedGame="";

function buy(game){
selectedGame=game;
document.getElementById("orderBox").style.display="block";
document.getElementById("game").innerText="Game: "+game;
}

function goPay(){
let uid=document.getElementById("uid").value;
if(uid===""){alert("Enter UID");return;}
document.getElementById("orderBox").style.display="none";
document.getElementById("payBox").style.display="block";
}

function confirmOrder(){
let uid=document.getElementById("uid").value;

let orders=JSON.parse(localStorage.getItem("orders")||"[]");

orders.push({
game:selectedGame,
uid:uid,
time:new Date().toLocaleString()
});

localStorage.setItem("orders",JSON.stringify(orders));

alert("Order Placed Successfully!");
document.getElementById("payBox").style.display="none";
}

function openAdmin(){
document.getElementById("adminLogin").style.display="block";
}

function login(){
let pass=document.getElementById("pass").value;
if(pass==="1234"){
document.getElementById("adminLogin").style.display="none";
document.getElementById("adminPanel").style.display="block";

let orders=JSON.parse(localStorage.getItem("orders")||"[]");

let html="";
orders.forEach(o=>{
html+=`<p>🎮 ${o.game} | UID: ${o.uid} | ⏰ ${o.time}</p>`;
});

document.getElementById("list").innerHTML=html || "No Orders";
}
else{
alert("Wrong Password");
}
}

</script>

</body>
</html></html><div id="adminBox">
<h2>Admin Panel</h2>
<p>New Orders will show here (demo only)</p>
<div id="orders"></div>
</div>

<script>

let selectedGame = "";

function buy(game){
selectedGame = game;
document.getElementById("gameName").innerText = "Game: " + game;
document.getElementById("orderBox").style.display = "block";
window.scrollTo(0,500);
}

function goPayment(){
let uid = document.getElementById("uid").value;
if(uid==""){
alert("Enter UID first");
return;
}
document.getElementById("orderBox").style.display="none";
document.getElementById("paymentBox").style.display="block";
document.getElementById("finalGame").innerText = selectedGame + " | UID: " + uid;
}

function confirmOrder(){
alert("Order Received!");
document.getElementById("paymentBox").style.display="none";

let div = document.getElementById("orders");
div.innerHTML += "<p>New Order: " + selectedGame + "</p>";
}

</script>

</body>
</html>
