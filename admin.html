<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZISAN ADMIN</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#111827;
padding:15px;
text-align:center;
}

.container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.card{
background:#1e293b;
padding:25px;
text-align:center;
border-radius:15px;
font-size:20px;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:scale(1.03);
background:#22c55e;
}

#content{
padding:20px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:16px;
}
</style>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

/* ---------------- PRODUCTS ---------------- */

function openProducts(){
showProducts();
}

function showProducts(){
let html = "<h2>📦 Product Management</h2>";

html += `<button onclick="addProduct()">➕ Add Product</button>`;

if(products.length === 0){
html += "<p>No products found</p>";
} else {
products.forEach(p => {
html += `
<div style="background:#1e293b;padding:10px;margin-top:10px;border-radius:10px;">
<b>${p.name}</b><br>
Price: ${p.price}
</div>
`;
});
}

document.getElementById("content").innerHTML = html;
}

function addProduct(){
let name = prompt("Product Name:");
let price = prompt("Price:");

if(!name || !price){
alert("সব কিছু দিতে হবে");
return;
}

products.push({
id: Date.now(),
name: name,
price: price
});

localStorage.setItem("products", JSON.stringify(products));

showProducts();
}

/* ---------------- OTHER ---------------- */

function openOrders(){
document.getElementById("content").innerHTML = `
<h2>📋 Orders</h2>
<p>No orders yet</p>
`;
}

function openSettings(){
document.getElementById("content").innerHTML = `
<h2>⚙️ Settings</h2>
<button>Payment Number</button>
<button>Banner Settings</button>
`;
}

function logoutAdmin(){
location.href="index.html";
}
</script>
<div id="productList"></div>

<script>
function loadProducts(){
let products = JSON.parse(localStorage.getItem("products")) || [];

let html = "";

if(products.length === 0){
html = "<p>No products found</p>";
} 
else {
products.forEach(p => {
html += `
<div style="background:#1e293b;color:white;padding:10px;margin:10px;border-radius:10px;">
<h3>${p.name}</h3>
<p>Price: ${p.price}</p>
</div>
`;
});
}

document.getElementById("productList").innerHTML = html;
}

loadProducts();

/* 🔥 LIVE UPDATE (important) */
window.addEventListener("storage", loadProducts);
  </script>
  
</head>

<body>

<header>
<h2>👑 ZISAN ADMIN PANEL</h2>
</header>

<div class="container">

<div class="card" onclick="openProducts()">
📦
<h3>Products</h3>
<p>Add / Edit / Delete</p>
</div>

<div class="card" onclick="openOrders()">
📋
<h3>Orders</h3>
<p>Manage Orders</p>
</div>

<div class="card" onclick="openSettings()">
⚙️
<h3>Settings</h3>
<p>Payment & Banner</p>
</div>

<div class="card" onclick="logoutAdmin()">
🚪
<h3>Logout</h3>
</div>

</div>

<div id="content"></div>

</body>
</html>
